name: CI

on:
  push:
    branches: ["**"]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "*.adoc"
      - "examples/**"
  pull_request:
    branches: ["master", "develop"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: ruff check
        run: ruff check rdflib_neo4j/ test/

  unit-tests:
    name: Unit tests / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run unit tests
        shell: bash
        run: |
          set +e
          pytest test/unit/ -v
          code=$?
          set -e
          # exit 5 = no tests collected; tolerated until test/unit/ is populated
          test $code -eq 0 -o $code -eq 5

  integration-tests:
    name: Integration tests / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    needs: unit-tests
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run integration tests
        run: pytest test/integration/ -v
